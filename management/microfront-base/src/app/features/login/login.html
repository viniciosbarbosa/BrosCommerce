<div class="container">
  <div class="form-container">
    <app-form-sign-in-up
      [viewState]="viewState()"
      [loading]="loading()"
      [errorMessage]="errorMessage()"
      (twoFactorAuthEmit)="handleTwoFactorEmit($event)"
      (loginEmit)="handleLoginIn($event)"
      (passwordRecoveryEmit)="handlePasswordRecovery($event)"
      (viewStateChange)="handleViewStateChange($event)"
      (backToLogin)="handleBackToLogin()"
    ></app-form-sign-in-up>
  </div>
</div>

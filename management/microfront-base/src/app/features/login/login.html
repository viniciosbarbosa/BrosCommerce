<div class="container">
  <div class="form-container">
    <app-form-sign-in-up
      [viewState]="viewState()"
      [loading]="loading()"
      [errorMessage]="errorMessage()"
      (twoFactorAuthEmit)="handleTwoFactorAuthSuccess($event)"
      (loginEmit)="handleLogin($event)"
      (passwordRecoveryEmit)="handlePasswordRecovery($event)"
    ></app-form-sign-in-up>
  </div>
</div>

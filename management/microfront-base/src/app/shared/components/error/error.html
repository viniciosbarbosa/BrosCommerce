<div class="error-container">
  <div class="error-content">
    <div class="error-code">{{ code() }}</div>
    <div class="error-title">{{ titleKey() | translate }}</div>
    <div class="error-message">{{ messageKey() | translate }}</div>
    <div class="error-actions">
      <a routerLink="/" class="btn-home">{{ 'ERROR.BACK_HOME' | translate }}</a>
    </div>
  </div>
</div>
